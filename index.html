<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>1RM Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #121212; user-select: none; }
        input[type=range] { -webkit-appearance: none; background: #1f2937; height: 10px; border-radius: 5px; width: 100%; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 30px; width: 30px; border-radius: 50%; background: #dc2626; border: 3px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .safe-top { padding-top: env(safe-area-inset-top, 20px); }
    </style>
</head>
<body class="text-white">

    <header class="bg-[#b30000] safe-top shadow-xl sticky top-0 z-20">
        <div class="p-4 text-center font-black uppercase tracking-widest text-sm">Old School Iron</div>
        <div class="flex text-[10px] font-black border-t border-white/10">
            <div class="flex-1 text-center py-3 border-b-4 border-white">1RM Calculator</div>
            <div class="flex-1 text-center py-3 opacity-40">Pullup Calc</div>
        </div>
    </header>

    <main class="p-6 max-w-md mx-auto">
        <!-- Weight -->
        <div class="mb-10 text-center">
            <h3 class="text-[10px] uppercase tracking-widest text-gray-500 mb-2">Weight Lifted</h3>
            <div class="text-5xl font-black mb-6"><span id="w-val">100</span><span class="text-red-600 text-xl ml-1" id="u-val">kg</span></div>
            <input id="w-slider" type="range" min="2.5" max="400" step="2.5" value="100">
        </div>

        <!-- Reps -->
        <div class="mb-10 text-center">
            <h3 class="text-[10px] uppercase tracking-widest text-gray-500 mb-2">Reps Completed</h3>
            <div class="text-5xl font-black mb-6"><span id="r-val">5</span><span class="text-red-600 text-xl ml-1">reps</span></div>
            <input id="r-slider" type="range" min="1" max="15" step="1" value="5">
        </div>

        <!-- Result -->
        <div class="bg-[#1a1a1a] p-8 rounded-3xl border border-gray-800 text-center shadow-2xl">
            <h3 class="text-[10px] uppercase tracking-widest text-gray-500 mb-2">One Rep Max</h3>
            <div class="text-7xl font-black text-white"><span id="orm">113</span></div>
            <div id="results-list" class="mt-8 space-y-4 text-left border-t border-gray-800 pt-6">
                <!-- Percentages will load here -->
            </div>
        </div>
    </main>

    <script>
        const coeffs = {1:1, 2:.95, 3:.926, 4:.9, 5:.882, 6:.858, 7:.824, 8:.809, 9:.779, 10:.76, 11:.745, 12:.73, 13:.71, 14:.695, 15:.681};
        const wS = document.getElementById('w-slider');
        const rS = document.getElementById('r-slider');
        
        function update() {
            const w = parseFloat(wS.value);
            const r = parseInt(rS.value);
            const orm = Math.round(w / (coeffs[r] || .681));
            
            document.getElementById('w-val').innerText = w;
            document.getElementById('r-val').innerText = r;
            document.getElementById('orm').innerText = orm;

            let html = '';
            [95, 90, 85, 80, 75].forEach(p => {
                html += `<div class="flex justify-between items-center"><span class="text-gray-500 font-bold text-xs">${p}%</span><span class="font-black text-sm">${Math.round(orm * p / 100)} kg</span></div>`;
            });
            document.getElementById('results-list').innerHTML = html;
        }

        wS.oninput = rS.oninput = update;
        update();
    </script>
</body>
</html>
