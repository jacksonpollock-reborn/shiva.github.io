<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="1RM Calc">
    <meta name="theme-color" content="#b30000">
    <title>1RM Calculator - Old School Iron</title>
    
    <!-- Inlined Web App Manifest for PWA Support -->
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Old%20School%20Iron%201RM%22,%22short_name%22:%221RM%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#121212%22,%22theme_color%22:%22#b30000%22}">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121212;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overflow-x: hidden;
        }

        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

        input[type=range] {
            -webkit-appearance: none;
            background: #1f2937;
            height: 10px;
            border-radius: 5px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 32px;
            width: 32px;
            border-radius: 50%;
            background: #dc2626;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0,0,0,0.6);
            border: 3px solid white;
        }

        /* Safe area handling */
        .safe-top { padding-top: env(safe-area-inset-top, 0px); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
        
        .active-tab {
            border-bottom: 4px solid white;
            color: white;
            background: rgba(179, 0, 0, 0.2);
        }
    </style>
</head>
<body class="text-white selection:bg-red-900">

    <!-- Top Navigation -->
    <header class="bg-[#b30000] safe-top shadow-xl sticky top-0 z-20">
        <div class="p-4 flex justify-between items-center font-black">
            <div class="flex-1 text-center flex items-center justify-center uppercase tracking-[0.2em] text-sm">
                <span>Old School Iron</span>
                <svg class="w-4 h-4 ml-1.5 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
            </div>
        </div>
        <nav class="flex text-[11px] font-black border-t border-white/10">
            <div class="flex-1 text-center py-3.5 uppercase tracking-tighter active-tab">1RM Calculator</div>
            <div class="flex-1 text-center py-3.5 text-white/50 uppercase tracking-tighter">Pullup Calc</div>
        </nav>
    </header>

    <main class="p-6 max-w-2xl mx-auto mb-6">
        <p class="text-gray-500 text-xs mb-10 leading-relaxed font-medium">
            Drag the weight and reps sliders to the highest weight you have lifted. Your One Rep Max will appear below.
        </p>

        <!-- Unit Selection -->
        <section class="mb-12">
            <h3 class="font-bold uppercase tracking-widest mb-1 text-[11px] text-gray-500">Unit of Measurement</h3>
            <div class="flex space-x-8 mt-5">
                <label class="flex items-center space-x-3 cursor-pointer" onclick="setUnit('kg')">
                    <div id="radio-kg" class="w-7 h-7 rounded-full border-2 flex items-center justify-center border-red-600 transition-all">
                        <div class="w-3.5 h-3.5 rounded-full bg-red-600"></div>
                    </div>
                    <span class="text-gray-200 font-bold text-sm">Metric (Kg)</span>
                </label>
                <label class="flex items-center space-x-3 cursor-pointer" onclick="setUnit('lb')">
                    <div id="radio-lb" class="w-7 h-7 rounded-full border-2 flex items-center justify-center border-gray-700 transition-all">
                        <div class="w-3.5 h-3.5 rounded-full bg-transparent"></div>
                    </div>
                    <span class="text-gray-200 font-bold text-sm">Imperial (lb)</span>
                </label>
            </div>
        </section>

        <!-- Weight Slider -->
        <section class="mb-14">
            <h3 class="font-bold uppercase tracking-widest mb-1 text-[11px] text-gray-500">Weight Lifted</h3>
            <div class="flex flex-col mt-6">
                <div class="text-white font-black text-5xl mb-8 text-center tabular-nums">
                    <span id="weight-display">100</span><span id="unit-label" class="text-red-600 text-2xl ml-1 font-bold">kg</span>
                </div>
                <div class="flex items-center space-x-6">
                    <button onclick="adjustWeight(-1)" class="w-16 h-16 flex-shrink-0 rounded-full bg-gray-800/80 flex items-center justify-center text-white active:scale-90 transition-all shadow-lg">
                        <svg class="w-9 h-9" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M20 12H4"></path></svg>
                    </button>
                    <input id="weight-slider" type="range" min="2.5" max="400" step="2.5" value="100" class="w-full">
                    <button onclick="adjustWeight(1)" class="w-16 h-16 flex-shrink-0 rounded-full bg-gray-800/80 flex items-center justify-center text-white active:scale-90 transition-all shadow-lg">
                        <svg class="w-9 h-9" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M12 4v16m8-8H4"></path></svg>
                    </button>
                </div>
            </div>
        </section>

        <!-- Reps Slider -->
        <section class="mb-14">
            <h3 class="font-bold uppercase tracking-widest mb-1 text-[11px] text-gray-500">Reps Completed</h3>
            <div class="flex flex-col mt-6">
                <div id="reps-display" class="text-white font-black text-5xl mb-8 text-center tabular-nums">5 <span class="text-red-600 text-2xl font-bold">reps</span></div>
                <div class="flex items-center space-x-6">
                    <button onclick="adjustReps(-1)" class="w-16 h-16 flex-shrink-0 rounded-full bg-gray-800/80 flex items-center justify-center text-white active:scale-90 transition-all shadow-lg">
                        <svg class="w-9 h-9" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M20 12H4"></path></svg>
                    </button>
                    <input id="reps-slider" type="range" min="1" max="15" step="1" value="5" class="w-full">
                    <button onclick="adjustReps(1)" class="w-16 h-16 flex-shrink-0 rounded-full bg-gray-800/80 flex items-center justify-center text-white active:scale-90 transition-all shadow-lg">
                        <svg class="w-9 h-9" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M12 4v16m8-8H4"></path></svg>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <!-- Results Section -->
    <div class="bg-[#1a1a1a] p-8 pb-40 rounded-t-[3.5rem] border-t border-gray-800 shadow-[0_-20px_50px_rgba(0,0,0,0.5)] relative z-10">
        <div class="max-w-2xl mx-auto">
            <div class="mb-14 text-center">
                <h3 class="text-gray-500 font-bold uppercase tracking-[0.4em] text-[10px] mb-5 opacity-70">Estimated One Rep Max</h3>
                <div class="inline-flex items-baseline group">
                    <span id="orm-display" class="text-8xl font-black text-white tracking-tighter tabular-nums drop-shadow-xl">113</span>
                    <span class="text-3xl font-black text-red-600 ml-3 uppercase" id="orm-unit">kg</span>
                </div>
            </div>

            <!-- Tables -->
            <div id="tables-container" class="space-y-14"></div>
        </div>
    </div>

    <script>
        const REP_COEFFICIENTS = {
            1: 1.000, 2: 0.950, 3: 0.926, 4: 0.900, 5: 0.882,
            6: 0.858, 7: 0.824, 8: 0.809, 9: 0.779, 10: 0.760,
            11: 0.745, 12: 0.730, 13: 0.710, 14: 0.695, 15: 0.681
        };

        const STANDARDS = [95, 90, 85, 80, 75, 70, 65, 60, 55, 50];
        const OLD_SCHOOL = [102.5, 97.5, 92.5, 87.5, 82.5, 77.5, 72.5, 67.5, 62.5, 57.5];
        const EST_REPS = [1, 3, 5, 8, 10, 12, 15];

        let state = {
            unit: 'kg',
            weight: 100,
            reps: 5,
            orm: 0
        };

        const weightSlider = document.getElementById('weight-slider');
        const repsSlider = document.getElementById('reps-slider');

        function setUnit(u) {
            if (state.unit === u) return;
            state.unit = u;
            
            document.getElementById('radio-kg').className = `w-7 h-7 rounded-full border-2 flex items-center justify-center ${u === 'kg' ? 'border-red-600 bg-red-600/5' : 'border-gray-700'}`;
            document.getElementById('radio-kg').children[0].className = `w-3.5 h-3.5 rounded-full ${u === 'kg' ? 'bg-red-600' : 'bg-transparent'}`;
            document.getElementById('radio-lb').className = `w-7 h-7 rounded-full border-2 flex items-center justify-center ${u === 'lb' ? 'border-red-600 bg-red-600/5' : 'border-gray-700'}`;
            document.getElementById('radio-lb').children[0].className = `w-3.5 h-3.5 rounded-full ${u === 'lb' ? 'bg-red-600' : 'bg-transparent'}`;
            
            if (u === 'lb') {
                weightSlider.min = 5; weightSlider.max = 800; weightSlider.step = 5;
                state.weight = Math.round((state.weight * 2.20462) / 5) * 5;
            } else {
                weightSlider.min = 2.5; weightSlider.max = 400; weightSlider.step = 2.5;
                state.weight = Math.round((state.weight / 2.20462) / 2.5) * 2.5;
            }
            weightSlider.value = state.weight;
            calculate();
        }

        function adjustWeight(dir) {
            const step = parseFloat(weightSlider.step);
            state.weight = Math.max(parseFloat(weightSlider.min), Math.min(parseFloat(weightSlider.max), state.weight + (dir * step)));
            weightSlider.value = state.weight;
            calculate();
        }

        function adjustReps(dir) {
            state.reps = Math.max(1, Math.min(15, state.reps + dir));
            repsSlider.value = state.reps;
            calculate();
        }

        weightSlider.addEventListener('input', (e) => { state.weight = parseFloat(e.target.value); calculate(); });
        repsSlider.addEventListener('input', (e) => { state.reps = parseInt(e.target.value); calculate(); });

        function calculate() {
            const coeff = REP_COEFFICIENTS[state.reps] || 0.681;
            state.orm = Math.round(state.weight / coeff);
            document.getElementById('weight-display').innerText = state.weight;
            document.getElementById('unit-label').innerText = state.unit;
            document.getElementById('reps-display').innerHTML = `${state.reps} <span class="text-red-600 text-2xl font-bold">reps</span>`;
            document.getElementById('orm-display').innerText = state.orm;
            document.getElementById('orm-unit').innerText = state.unit;
            renderTables();
        }

        function renderTables() {
            const container = document.getElementById('tables-container');
            container.innerHTML = `
                ${createTable("Standard Percentages", STANDARDS, STANDARDS.map(p => Math.round(state.orm * (p/100) * 2)/2))}
                ${createTable("Old School Percentages", OLD_SCHOOL, OLD_SCHOOL.map(p => Math.round(state.orm * (p/100) * 2)/2))}
                ${createTable("Repetitions Table", EST_REPS, EST_REPS.map(r => Math.round(state.orm * REP_COEFFICIENTS[r] * 2)/2), "Reps")}
            `;
        }

        function createTable(title, headers, values, headerLabel = "%") {
            return `
                <div>
                    <h4 class="text-gray-500 font-bold uppercase text-[10px] tracking-[0.25em] mb-5 flex items-center opacity-80">
                        <span class="w-1.5 h-1.5 bg-red-600 rounded-full mr-2.5"></span>${title}
                    </h4>
                    <div class="overflow-x-auto custom-scrollbar pb-4 -mx-2 px-2">
                        <div class="min-w-max">
                            <div class="flex border-b border-white/5 pb-3.5 mb-3.5">
                                <div class="w-20 text-[10px] font-black text-gray-600 uppercase pt-1 tracking-tighter">${headerLabel}</div>
                                ${headers.map(h => `<div class="w-20 text-center text-[13px] font-black text-gray-400 tabular-nums">${h}</div>`).join('')}
                            </div>
                            <div class="flex">
                                <div class="w-20 text-[10px] font-black text-gray-600 uppercase tracking-tighter">Weight</div>
                                ${values.map(v => `<div class="w-20 text-center text-sm font-black text-white tabular-nums">${v}</div>`).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Initialize
        calculate();

        // Safety-wrapped Service Worker logic to prevent protocol errors in previews
        try {
            if ('serviceWorker' in navigator && location.protocol === 'https:') {
                // We only try to register if we are on a secure context and not a blob/local preview
                // To keep it single-file, a real SW would need its own .js file on GitHub.
                // For now, we skip the error-prone blob registration.
                console.log("PWA: Standalone mode ready. Add to Home Screen for best experience.");
            }
        } catch (e) {
            console.warn("PWA: Service Worker registration skipped due to environment constraints.");
        }
    </script>
</body>
</html>
